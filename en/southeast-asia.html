<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Southeast Asia — Geo Quiz</title>
<style>
  :root{
    --navy:#1f4e96; --navy-d:#173d77; --navy-l:#2d62b5;
    --sky:#eef4fc; --sea:#cfe0f5; --land:#ffffff; --line:#000000;
    --land-hover:#bcd6f7; --land-ok:#cdebd9; --line-ok:#3aa76d;
    --ok:#36b37e; --bad:#e35d4f; --ink:#1d2b45; --panel:#1f4e96;
    --chip:#ffffff; --chip-b:#c3d4ec; --shadow:0 8px 30px rgba(20,45,90,.14);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:#e7edf5;color:var(--ink);
    font-family:"Segoe UI",system-ui,Roboto,"Helvetica Neue",Arial,sans-serif;
    -webkit-tap-highlight-color:transparent;}
  .app{max-width:980px;margin:16px auto;background:#fff;border-radius:16px;
    overflow:hidden;box-shadow:var(--shadow);border:1px solid #dce5f1;}

  /* Header */
  .top{display:flex;align-items:center;gap:14px;padding:14px 18px;
    background:linear-gradient(180deg,#fff 0,#fff 100%);}
  .top .badge{width:46px;height:46px;border-radius:50%;background:var(--sky);
    display:grid;place-items:center;font-size:24px;color:var(--navy);flex:none;
    border:1px solid #d6e3f4;}
  .titlebar{flex:1;background:linear-gradient(180deg,var(--navy-l),var(--navy));
    color:#fff;border-radius:10px;text-align:center;padding:11px;
    font-size:24px;font-weight:800;letter-spacing:4px;box-shadow:inset 0 -3px 0 rgba(0,0,0,.12);}

  /* Stats bar */
  .stats{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;
    padding:8px 14px 4px;}
  .pill{background:var(--sky);border:1px solid #d3e1f3;border-radius:999px;
    padding:6px 14px;font-weight:700;font-size:13px;color:#274a85;}
  .pill b{color:var(--navy)}
  .btn{border:0;border-radius:999px;padding:8px 16px;font-weight:700;font-size:13px;
    cursor:pointer;background:var(--navy);color:#fff;transition:.15s;}
  .btn:hover{background:var(--navy-l)}
  .btn.ghost{background:#fff;color:var(--navy);border:1px solid var(--navy)}

  /* Map area */
  .mapwrap{position:relative;margin:6px 14px 0;border-radius:12px;overflow:hidden;
    background:var(--sea);border:1px solid #b9d0ee;}
  svg#map{display:block;width:100%;height:auto;touch-action:none;}
  .country{fill:var(--land);stroke:var(--line);stroke-width:.6;
    stroke-linejoin:round;transition:fill .12s;}
  .country.hover{fill:var(--land-hover)}
  .country.ok{fill:var(--land-ok);stroke:var(--line-ok);stroke-width:.8}
  .lbl{font:700 12px "Segoe UI",sans-serif;fill:#0e3a78;text-anchor:middle;
    paint-order:stroke;stroke:#fff;stroke-width:2px;pointer-events:none;}
  /* tiny microstate countries: real shape + outline ring for visibility */
  .country.tiny{stroke:#7a4ec0;stroke-width:1.2}
  .country.tiny.ok{stroke:#3aa76d}
  .tiny-ring{fill:none;stroke:#7a4ec0;stroke-width:1;opacity:.55;pointer-events:none;transition:opacity .12s}
  .tiny-ring.hide{opacity:0}
  .tiny-hit{fill:transparent;stroke:none;cursor:pointer;}
  .mlbl{font:700 11px "Segoe UI",sans-serif;fill:#5a2ea6;text-anchor:middle;
    paint-order:stroke;stroke:#fff;stroke-width:2px;pointer-events:none;}

  .howto{position:absolute;top:10px;right:10px;width:150px;background:#fff;
    border:1px solid #cdddf2;border-radius:10px;padding:10px;font-size:11px;
    line-height:1.35;box-shadow:0 4px 14px rgba(0,0,0,.08);}
  .howto h3{margin:0 0 4px;color:var(--navy);font-size:12px;letter-spacing:.5px;
    display:flex;align-items:center;gap:5px;}
  .howto p{margin:0;color:#3b4d6b}
  @media(max-width:640px){.howto{display:none}}

  /* Word list panel */
  .listbar{margin:12px 14px 16px;background:var(--panel);border-radius:12px;overflow:hidden;}
  .listbar h2{margin:0;padding:10px;text-align:center;color:#fff;font-size:12.5px;
    letter-spacing:.4px;font-weight:800;background:rgba(255,255,255,.06);}
  .chips{padding:12px;display:flex;flex-wrap:wrap;gap:7px;
    justify-content:flex-start;}
  .chip{background:var(--chip);border:1px solid var(--chip-b);border-radius:8px;
    padding:6px 10px;font-size:12.5px;font-weight:700;color:var(--ink);
    cursor:grab;user-select:none;touch-action:none;transition:.12s;white-space:nowrap;}
  .chip:hover{border-color:var(--navy);transform:translateY(-1px)}
  .chip:active{cursor:grabbing}
  .chip.dragging{opacity:.35}
  .chip.done{background:var(--ok);color:#fff;border-color:var(--ok);
    cursor:default;transform:none;}
  .chip.done:hover{transform:none}


  /* zoom controls */
  .mapwrap{touch-action:none}
  .zoomctl{position:absolute;left:10px;bottom:10px;display:flex;flex-direction:column;gap:4px;z-index:5}
  .zoomctl button{width:34px;height:34px;border:1px solid #cdddf2;background:#fff;border-radius:8px;
    font-size:20px;font-weight:800;color:var(--navy);cursor:pointer;line-height:1;box-shadow:0 2px 8px rgba(0,0,0,.1)}
  .zoomctl button:hover{background:var(--sky)}
  .zoomhint{position:absolute;right:10px;bottom:10px;font-size:10px;color:#5a6c89;
    background:rgba(255,255,255,.8);padding:3px 7px;border-radius:6px;z-index:5;pointer-events:none}
  /* drop crosshair (shows where the chip will land, above the finger) */
  #crosshair{position:fixed;z-index:9998;pointer-events:none;display:none;width:46px;height:46px;
    margin-left:-23px;margin-top:-23px}
  #crosshair svg{width:100%;height:100%}

  /* Drag ghost */
  #ghost{position:fixed;z-index:9999;pointer-events:none;background:#fff;
    border:2px solid var(--navy);border-radius:8px;padding:6px 10px;
    font-size:12.5px;font-weight:700;box-shadow:0 8px 22px rgba(0,0,0,.28);
    transform:translate(-50%,-150%);display:none;color:var(--ink);}

  /* Toast + win */
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);
    background:#1d2b45;color:#fff;padding:10px 20px;border-radius:999px;
    font-weight:700;font-size:14px;opacity:0;transition:opacity .2s;
    z-index:10000;pointer-events:none;}
  #toast.show{opacity:1}#toast.ok{background:var(--ok)}#toast.bad{background:var(--bad)}
  .win{position:fixed;inset:0;background:rgba(20,40,80,.55);display:none;
    place-items:center;z-index:10001;}
  .win.show{display:grid}
  .card{background:#fff;border-radius:16px;padding:26px 30px;text-align:center;
    max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);position:relative;
    animation:pop .45s cubic-bezier(.18,.9,.34,1.4);}
  @keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
  .card h2{margin:0 0 6px;color:var(--navy);font-size:24px}
  .card p{margin:0 0 16px;color:#43577a;font-size:14px;line-height:1.5}
  .card .emoji{font-size:54px;line-height:1;margin:2px 0 8px;display:block;
    animation:bounce 1s ease infinite;}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  .stat-line{display:flex;gap:10px;justify-content:center;margin:0 0 16px;flex-wrap:wrap}
  .stat-line .box{background:var(--sky);border:1px solid #d3e1f3;border-radius:10px;
    padding:8px 14px;font-size:13px;font-weight:700;color:var(--navy);min-width:74px}
  .stat-line .box small{display:block;font-size:10px;color:#6b7f9f;font-weight:600;letter-spacing:.3px}
  /* PERFECT (no-mistake) special theme */
  .card.perfect{background:linear-gradient(160deg,#fffdf5,#fff7e0);
    border:2px solid #f3c84b;box-shadow:0 0 0 6px rgba(243,200,75,.25),0 22px 60px rgba(120,90,0,.35);}
  .card.perfect h2{background:linear-gradient(90deg,#d99100,#f3c84b,#d99100);
    -webkit-background-clip:text;background-clip:text;color:transparent;font-size:26px;
    letter-spacing:1px;}
  .card.perfect .ribbon{position:absolute;top:-14px;left:50%;transform:translateX(-50%);
    background:linear-gradient(90deg,#e0a106,#ffd34d,#e0a106);color:#5a3d00;
    font-weight:800;font-size:12px;letter-spacing:2px;padding:6px 18px;border-radius:999px;
    box-shadow:0 4px 12px rgba(150,110,0,.4);white-space:nowrap;}
  .card.perfect .box{background:#fff7df;border-color:#f0d488;color:#9a6c00}
  .card.perfect .box small{color:#b98c1f}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:10002;display:none}
  #confetti.show{display:block}
  .credit{text-align:center;font-size:11px;color:#8aa0c0;padding:0 0 14px;}
</style>

<script>
const CENTROIDS = {"Myanmar": [264.2, 162.3], "Thailand": [306.3, 230.4], "Laos": [346.0, 163.9], "Cambodia": [351.9, 234.0], "Vietnam": [378.0, 199.3], "Malaysia": [474.5, 323.0], "Philippines": [549.0, 195.0], "Indonesia": [457.1, 376.9]};
const NAMES = ["Brunei", "Cambodia", "Indonesia", "Laos", "Malaysia", "Myanmar", "Philippines", "Singapore", "Thailand", "Timor-Leste", "Vietnam"];
const TINY = {"Timor-Leste": {"cx": 578.5, "cy": 482.4}, "Brunei": {"cx": 472.7, "cy": 319.3}, "Singapore": {"cx": 471, "cy": 354}};
const LABELS = {};
const UI = {"title": "SOUTHEAST ASIA", "map_aria": "Map of Southeast Asia", "placed": "Placed", "mistakes": "Mistakes", "hide": "Hide labels", "show": "Show labels", "restart": "Restart", "listhead": "DRAG THE NAMES AND DROP THEM ON THE CORRECT LOCATION", "howto_h": "HOW TO PLAY", "howto_p": "Drag each name from the list and drop it on the map in the correct location!", "correct": "Correct!", "wrong": "Not there — try again", "complete": "Complete!", "perfect": "PERFECT!", "ribbon": "PERFECT CLEAR", "c_countries": "PLACES", "c_mistakes": "MISTAKES", "c_time": "TIME", "msg_normal": "Great job! All {n} placed, with {m} mistake{s}.<br>Try again for a perfect run!", "msg_perfect": "Flawless! You placed all {n} with zero mistakes.<br>A true {map} Master! 🌍✨", "playagain": "Play again", "credit": "11 countries · drag & drop geography quiz", "crumb": "<a href=\"../index.html\">🏠 TOP</a><span class=\"sep\">›</span><a href=\"index.html\">English</a><span class=\"sep\">›</span><span>Southeast Asia</span>", "backlinks": "<a class=\"primary\" href=\"index.html\">↩ Regions</a> <a href=\"../ja/southeast-asia.html\">🇯🇵 日本語</a>", "mapname": "Southeast Asia"};
const VERSION = "v1.1";

const map=document.getElementById('map');
const landG=document.getElementById('land');
const labelG=document.getElementById('labels-layer');
const chipsEl=document.getElementById('chips');
const ghost=document.getElementById('ghost');
const crosshair=document.getElementById('crosshair');
const toast=document.getElementById('toast');
const $done=document.getElementById('done');
const $miss=document.getElementById('miss');
const $total=document.getElementById('total');
const win=document.getElementById('win');
const winmsg=document.getElementById('winmsg');
const SVGNS='http://www.w3.org/2000/svg';

let placed=0, miss=0, showLabels=true;
const TOTAL=NAMES.length;
$total.textContent=TOTAL;
document.getElementById('ver').textContent=VERSION;
var _cc=document.getElementById('cc'); if(_cc)_cc.textContent=TOTAL;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

/* For tiny microstate countries (real shapes, but small), add a visibility
   ring and an invisible larger circular hit-area so they are easy to drop on. */
const tinyLayer=document.createElementNS(SVGNS,'g');
tinyLayer.setAttribute('id','tiny-aids');
map.insertBefore(tinyLayer, labelG);
function buildTinyAids(){
  tinyLayer.innerHTML='';
  Object.keys(TINY).forEach(name=>{
    const t=TINY[name];
    // mark the real path as tiny
    const path=map.querySelector(`.country[data-name="${cssEsc(name)}"]`);
    if(path)path.classList.add('tiny');
    // visibility ring around the shape
    const ring=document.createElementNS(SVGNS,'circle');
    ring.setAttribute('cx',t.cx);ring.setAttribute('cy',t.cy);ring.setAttribute('r',7);
    ring.setAttribute('class','tiny-ring');ring.dataset.name=name;
    tinyLayer.appendChild(ring);
    // invisible hit target
    const hit=document.createElementNS(SVGNS,'circle');
    hit.setAttribute('cx',t.cx);hit.setAttribute('cy',t.cy);hit.setAttribute('r',9);
    hit.setAttribute('class','tiny-hit');hit.dataset.name=name;hit.dataset.tiny='1';
    tinyLayer.appendChild(hit);
  });
}

function buildChips(){
  chipsEl.innerHTML='';
  [...NAMES].sort((a,b)=>a.localeCompare(b)).forEach(n=>{
    const c=document.createElement('div');
    c.className='chip';c.textContent=(LABELS[n]||n);c.dataset.name=n;
    chipsEl.appendChild(c);
  });
}
function resetMap(){
  map.querySelectorAll('.country').forEach(p=>p.classList.remove('ok','hover'));
  labelG.innerHTML='';
  buildTinyAids();
}
let startTime=0;
function reset(){
  placed=0;miss=0;$done.textContent=0;$miss.textContent=0;
  resetMap();buildChips();win.classList.remove('show');
  stopConfetti();
  startTime=Date.now();
}
function fmtTime(ms){
  const s=Math.round(ms/1000);
  return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
}

/* drop test: country path OR tiny-country hit area under this point.
   A tiny hit-area resolves to its real country path. */
function countryAt(x,y){
  const el=document.elementFromPoint(x,y);
  if(!el||!el.classList)return null;
  if(el.dataset && el.dataset.tiny){
    return map.querySelector(`.country[data-name="${cssEsc(el.dataset.name)}"]`);
  }
  if(el.classList.contains('country'))return el;
  return null;
}
function clearHover(){
  map.querySelectorAll('.country.hover').forEach(e=>e.classList.remove('hover'));
}

function toastMsg(msg,type){
  toast.textContent=msg;toast.className='show '+(type||'');
  clearTimeout(toastMsg.t);
  toastMsg.t=setTimeout(()=>toast.className='',1000);
}

function addLabel(name){
  const isTiny = !!TINY[name];
  const c = isTiny ? [TINY[name].cx, TINY[name].cy-9] : CENTROIDS[name];
  if(!c)return;
  const t=document.createElementNS(SVGNS,'text');
  t.setAttribute('x',c[0]);t.setAttribute('y',c[1]+2);
  t.setAttribute('class', isTiny ? 'mlbl' : 'lbl');
  t.dataset.name=name;
  t.textContent=(LABELS[name]||name);
  if(!showLabels)t.style.display='none';
  labelG.appendChild(t);
}

function place(name){
  const path=map.querySelector(`.country[data-name="${cssEsc(name)}"]`);
  if(path){path.classList.add('ok');path.classList.remove('hover');}
  if(TINY[name]){
    const ring=tinyLayer.querySelector(`.tiny-ring[data-name="${cssEsc(name)}"]`);
    if(ring)ring.classList.add('hide');
  }
  addLabel(name);
  const chip=chipsEl.querySelector(`.chip[data-name="${cssEsc(name)}"]`);
  if(chip){chip.classList.add('done');}
  placed++;$done.textContent=placed;
  if(placed===TOTAL){
    setTimeout(triggerWin,300);
  }
}

/* ---------- WIN EVENTS ---------- */
function triggerWin(){
  const perfect = (miss===0);
  const elapsed = Date.now()-startTime;
  const card=document.getElementById('card');
  const ribbon=document.getElementById('ribbon');
  document.getElementById('winCount').textContent=TOTAL;
  document.getElementById('winMiss').textContent=miss;
  document.getElementById('winTime').textContent=fmtTime(elapsed);

  if(perfect){
    card.classList.add('perfect');
    ribbon.style.display='';
    document.getElementById('winEmoji').textContent='🏆';
    document.getElementById('winTitle').textContent=UI.perfect;
    winmsg.innerHTML=UI.msg_perfect.replace('{n}','<b>'+TOTAL+'</b>').replace('{map}','<b>'+(UI.mapname||UI.title)+'</b>');
    startConfetti(true);
  }else{
    card.classList.remove('perfect');
    ribbon.style.display='none';
    document.getElementById('winEmoji').textContent='🎉';
    document.getElementById('winTitle').textContent=UI.complete;
    winmsg.innerHTML=UI.msg_normal.replace('{n}','<b>'+TOTAL+'</b>').replace('{m}','<b>'+miss+'</b>').replace('{s}',miss===1?'':'s');
    startConfetti(false);
  }
  win.classList.add('show');
}
function cssEsc(s){return (window.CSS&&CSS.escape)?CSS.escape(s):s.replace(/["\\]/g,'\\$&');}

/* ---------- pointer drag (mouse + touch) ---------- */
let drag=null;
function startDrag(chip,e){
  if(chip.classList.contains('done'))return;
  drag={name:chip.dataset.name,chip};
  chip.classList.add('dragging');
  ghost.textContent=chip.textContent;
  ghost.style.display='block';
  moveGhost(e.clientX,e.clientY);
}
function isPlaced(name){
  const chip=chipsEl.querySelector(`.chip[data-name="${cssEsc(name)}"]`);
  return chip && chip.classList.contains('done');
}
const DROP_DY=54;  // drop point sits this many px ABOVE the finger
function dropPoint(x,y){ return {x:x, y:y-DROP_DY}; }
function moveGhost(x,y){
  ghost.style.left=x+'px';ghost.style.top=y+'px';
  const dp=dropPoint(x,y);
  crosshair.style.left=dp.x+'px';crosshair.style.top=dp.y+'px';crosshair.style.display='block';
  clearHover();
  const c=countryAt(dp.x,dp.y);
  if(c && !c.classList.contains('ok'))c.classList.add('hover');
}
function endDrag(x,y){
  if(!drag)return;
  const dp=dropPoint(x,y);
  const target=countryAt(dp.x,dp.y);
  drag.chip.classList.remove('dragging');
  ghost.style.display='none';
  crosshair.style.display='none';
  clearHover();
  if(target && target.dataset.name===drag.name && !isPlaced(drag.name)){
    place(drag.name);toastMsg(UI.correct,'ok');
  }else{
    miss++;$miss.textContent=miss;toastMsg(UI.wrong,'bad');
  }
  drag=null;
}

chipsEl.addEventListener('pointerdown',e=>{
  const chip=e.target.closest('.chip');
  if(!chip)return;
  e.preventDefault();
  try{chip.setPointerCapture(e.pointerId);}catch(_){}
  startDrag(chip,e);
});
document.addEventListener('pointermove',e=>{
  if(drag){e.preventDefault();moveGhost(e.clientX,e.clientY);}
},{passive:false});
document.addEventListener('pointerup',e=>{if(drag)endDrag(e.clientX,e.clientY);});
document.addEventListener('pointercancel',()=>{
  if(drag){drag.chip.classList.remove('dragging');ghost.style.display='none';crosshair.style.display='none';clearHover();drag=null;}
});

/* labels toggle */
document.getElementById('labels').addEventListener('click',e=>{
  showLabels=!showLabels;
  e.target.textContent=showLabels?UI.hide:UI.show;
  labelG.querySelectorAll('.lbl,.mlbl').forEach(t=>t.style.display=showLabels?'':'none');
});
document.getElementById('reset').addEventListener('click',reset);
document.getElementById('playagain').addEventListener('click',reset);

/* ---------- Confetti engine (no libraries) ---------- */
const confEl=document.getElementById('confetti');
const cctx=confEl.getContext('2d');
let confParticles=[], confRAF=null, confStop=0;
function sizeCanvas(){confEl.width=innerWidth;confEl.height=innerHeight;}
addEventListener('resize',sizeCanvas);
const NORMAL_COLORS=['#1f4e96','#36b37e','#e35d4f','#f3c84b','#2d62b5','#7a4ec0'];
const GOLD_COLORS=['#ffd34d','#f3c84b','#e0a106','#fff3c4','#ffb300','#fff'];
const RAINBOW=['#ff4d4d','#ff9a3d','#ffe14d','#5ad469','#4db5ff','#9a6bff','#ff6bd0'];

function spawn(n,x,y,palette,spread,power){
  for(let i=0;i<n;i++){
    const ang=(-Math.PI/2)+(Math.random()-.5)*spread;
    const sp=power*(0.5+Math.random());
    confParticles.push({
      x,y,
      vx:Math.cos(ang)*sp+(Math.random()-.5)*2,
      vy:Math.sin(ang)*sp,
      g:0.18+Math.random()*0.12,
      size:5+Math.random()*7,
      color:palette[(Math.random()*palette.length)|0],
      rot:Math.random()*Math.PI,
      vr:(Math.random()-.5)*0.3,
      shape:Math.random()<0.5?'rect':'circ',
      life:0, ttl:160+Math.random()*120
    });
  }
}
function startConfetti(perfect){
  sizeCanvas();
  confEl.classList.add('show');
  confParticles=[];
  const W=innerWidth,H=innerHeight;
  if(perfect){
    // big dual cannons + center fountain, gold+rainbow, repeated bursts
    spawn(140, W*0.12, H*0.95, GOLD_COLORS, 0.9, 17);
    spawn(140, W*0.88, H*0.95, GOLD_COLORS, 0.9, 17);
    spawn(120, W*0.5, H*1.0, RAINBOW, 1.4, 15);
    let bursts=0;
    confStop=Date.now()+5200;
    const iv=setInterval(()=>{
      bursts++;
      spawn(70, Math.random()*W, H*1.02, Math.random()<.5?GOLD_COLORS:RAINBOW, 1.6, 14);
      if(bursts>=6){clearInterval(iv);}
    },420);
  }else{
    spawn(90, W*0.15, H*0.95, NORMAL_COLORS, 0.8, 15);
    spawn(90, W*0.85, H*0.95, NORMAL_COLORS, 0.8, 15);
    confStop=Date.now()+2600;
  }
  if(!confRAF)loopConfetti();
}
function stopConfetti(){
  confParticles=[];confStop=0;
  if(confRAF){cancelAnimationFrame(confRAF);confRAF=null;}
  cctx.clearRect(0,0,confEl.width,confEl.height);
  confEl.classList.remove('show');
}
function loopConfetti(){
  cctx.clearRect(0,0,confEl.width,confEl.height);
  for(let i=confParticles.length-1;i>=0;i--){
    const p=confParticles[i];
    p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.vx*=0.99;p.rot+=p.vr;p.life++;
    if(p.y>confEl.height+30||p.life>p.ttl){confParticles.splice(i,1);continue;}
    cctx.save();cctx.translate(p.x,p.y);cctx.rotate(p.rot);
    cctx.fillStyle=p.color;cctx.globalAlpha=Math.max(0,1-p.life/p.ttl);
    if(p.shape==='rect'){cctx.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.55);}
    else{cctx.beginPath();cctx.arc(0,0,p.size*0.45,0,7);cctx.fill();}
    cctx.restore();
  }
  if(confParticles.length>0 || Date.now()<confStop){
    confRAF=requestAnimationFrame(loopConfetti);
  }else{
    confRAF=null;confEl.classList.remove('show');
  }
}

function applyUI(){
  document.documentElement.lang = (UI===UI?document.documentElement.lang:'');
  document.querySelector('.titlebar').textContent=UI.title;
  document.querySelector('#map').setAttribute('aria-label',UI.map_aria);
  const pills=document.querySelectorAll('.stats .pill');
  // preserve existing <b> counter nodes; only relabel the leading text
  pills[0].childNodes[0].nodeValue=UI.placed+' ';
  pills[1].childNodes[0].nodeValue=UI.mistakes+' ';
  document.getElementById('labels').textContent=UI.hide;
  document.getElementById('reset').textContent=UI.restart;
  document.querySelector('.listbar h2').textContent=UI.listhead;
  document.querySelector('.howto h3').innerHTML='👆 '+UI.howto_h;
  document.querySelector('.howto p').textContent=UI.howto_p;
  document.getElementById('ribbon').textContent=UI.ribbon;
  const boxes=document.querySelectorAll('.stat-line .box small');
  if(boxes[0])boxes[0].textContent=UI.c_countries;
  if(boxes[1])boxes[1].textContent=UI.c_mistakes;
  if(boxes[2])boxes[2].textContent=UI.c_time;
  document.getElementById('playagain').textContent=UI.playagain;
  document.querySelector('.credit').innerHTML=UI.credit+' · <b id="ver"></b>';
  document.getElementById('ver').textContent=VERSION;
  const cb=document.getElementById('crumb'); if(cb)cb.innerHTML=UI.crumb;
  const bl=document.getElementById('backlinks'); if(bl)bl.innerHTML=UI.backlinks;
}
/* ---------- zoom & pan ---------- */
const VB={x:0,y:0,w:800,h:600};
const VB0={x:0,y:0,w:800,h:600};
function applyVB(){ map.setAttribute('viewBox',`${VB.x} ${VB.y} ${VB.w} ${VB.h}`); }
function clampVB(){
  if(VB.w>VB0.w)VB.w=VB0.w; if(VB.h>VB0.h)VB.h=VB0.h;
  if(VB.x<VB0.x)VB.x=VB0.x; if(VB.y<VB0.y)VB.y=VB0.y;
  if(VB.x+VB.w>VB0.x+VB0.w)VB.x=VB0.x+VB0.w-VB.w;
  if(VB.y+VB.h>VB0.y+VB0.h)VB.y=VB0.y+VB0.h-VB.h;
}
function zoomAt(cx,cy,factor){
  // cx,cy in client coords -> map coords
  const rect=map.getBoundingClientRect();
  const mx=VB.x+(cx-rect.left)/rect.width*VB.w;
  const my=VB.y+(cy-rect.top)/rect.height*VB.h;
  let nw=VB.w/factor, nh=VB.h/factor;
  const minW=VB0.w/6;  // max zoom 6x
  if(nw<minW){nw=minW;nh=minW*VB0.h/VB0.w;}
  VB.x=mx-(mx-VB.x)*(nw/VB.w);
  VB.y=my-(my-VB.y)*(nh/VB.h);
  VB.w=nw;VB.h=nh;clampVB();applyVB();
}
function zoomCenter(factor){const r=map.getBoundingClientRect();zoomAt(r.left+r.width/2,r.top+r.height/2,factor);}
document.getElementById('zin').addEventListener('click',()=>zoomCenter(1.4));
document.getElementById('zout').addEventListener('click',()=>zoomCenter(1/1.4));
document.getElementById('zreset').addEventListener('click',()=>{VB.x=VB0.x;VB.y=VB0.y;VB.w=VB0.w;VB.h=VB0.h;applyVB();});

// wheel zoom
map.addEventListener('wheel',e=>{e.preventDefault();zoomAt(e.clientX,e.clientY, e.deltaY<0?1.15:1/1.15);},{passive:false});

// pan + pinch via pointer events on the map (only when not dragging a chip)
let panPts=new Map(), panLast=null, pinchLast=null;
map.addEventListener('pointerdown',e=>{ if(drag)return; panPts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  if(panPts.size===1)panLast={x:e.clientX,y:e.clientY}; });
map.addEventListener('pointermove',e=>{
  if(drag)return;
  if(!panPts.has(e.pointerId))return;
  panPts.set(e.pointerId,{x:e.clientX,y:e.clientY});
  const pts=[...panPts.values()];
  if(pts.length===1 && panLast){
    const r=map.getBoundingClientRect();
    const dx=(e.clientX-panLast.x)/r.width*VB.w;
    const dy=(e.clientY-panLast.y)/r.height*VB.h;
    VB.x-=dx;VB.y-=dy;clampVB();applyVB();
    panLast={x:e.clientX,y:e.clientY};
  }else if(pts.length===2){
    const d=Math.hypot(pts[0].x-pts[1].x,pts[0].y-pts[1].y);
    const mid={x:(pts[0].x+pts[1].x)/2,y:(pts[0].y+pts[1].y)/2};
    if(pinchLast){ zoomAt(mid.x,mid.y, d/pinchLast); }
    pinchLast=d;
  }
});
function panEnd(e){ panPts.delete(e.pointerId); if(panPts.size<2)pinchLast=null; if(panPts.size===0)panLast=null; }
map.addEventListener('pointerup',panEnd);
map.addEventListener('pointercancel',panEnd);
map.addEventListener('pointerleave',panEnd);
applyVB();

applyUI();
reset();
</script>
